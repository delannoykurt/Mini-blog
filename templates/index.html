{% extends 'base.html' %} {% block content %}
<h1>Mini-blog</h1>
<a href="{{ url_for('ajouter') }}">Ajouter un article</a>
{% for article in articles %}
<div class="article">
    <h2>{{ article.titre }}</h2>
    <p>{{ article.contenu }}</p>
</div>
{% else %}
<p>Aucun article pour le moment.</p>
{% endfor %} {% endblock %}
